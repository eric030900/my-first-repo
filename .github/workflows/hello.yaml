name: 打招呼機器人

on:
  push:
  workflow_dispatch:

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 打招呼
        run: echo "哈囉 eric030900！你剛剛 push 了新東西 👋"

      - name: 產生最後更新時間
        run: echo "最後更新時間：$(date '+%Y-%m-%d %H:%M:%S')" > LAST_UPDATED.txt

      - name: 自動提交這個檔案
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add LAST_UPDATED.txt
          git commit -m "🤖 自動更新時間戳記" || echo "沒有變更，跳過提交"
          git push

      - name: 檢查 README 是否包含必要說明
        run: |
          if grep -q "Git" README.md; then
            echo "✅ 檢查通過，README 裡有提到 Git"
          else
            echo "❌ 檢查失敗，README 裡沒有提到 Git！"
            exit 1
          fi

      - name: 每日一言
        run: |
          quotes=(
            "成功不是終點，失敗也不是終結，唯有勇氣才能持續前進。"
            "今天的努力，是明天的底氣。"
            "程式碼會壞，但別放棄自己。"
            "先完成，再完美。"
            "每一次 commit，都是一次成長的紀錄。"
          )
          random_quote=${quotes[$RANDOM % ${#quotes[@]}]}
          echo "$(date '+%Y-%m-%d %H:%M') - $random_quote" >> QUOTES.txt
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add QUOTES.txt
          git commit -m "🎲 新增每日一言" || echo "沒有變更，跳過提交"
          git push