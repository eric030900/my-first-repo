name: 打招呼機器人

on:
  push:
  workflow_dispatch:

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 打招呼
        run: echo "哈囉 eric030900！你剛剛 push 了新東西 👋"

      - name: 檢查 README 是否包含必要說明
        run: |
          if grep -q "Git" README.md; then
            echo "✅ 檢查通過，README 裡有提到 Git"
          else
            echo "❌ 檢查失敗，README 裡沒有提到 Git！"
            exit 1
          fi